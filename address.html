<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Address</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f2f2f2;
}

.header{
background:#0b3d91;
color:white;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.box{
background:white;
width:90%;
max-width:420px;
margin:25px auto;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:green;
color:white;
font-size:18px;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
Delivery Address
</div>

<div class="box">

<h2>Shipping Details</h2>

<input type="text" placeholder="Full Name">

<input type="tel" placeholder="Mobile Number">

<textarea placeholder="Full Address"></textarea>

<input type="text" placeholder="City">

<input type="text" placeholder="State">

<input type="text" placeholder="PIN Code">

<button>Continue</button>

</div>

</body>
  </html>
