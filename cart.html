<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

.header{
background:#0b3d91;
color:white;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
text-align:center;
}

img{
width:150px;
border-radius:10px;
}

.price{
font-size:26px;
color:green;
font-weight:bold;
margin:10px 0;
}

.total{
font-size:28px;
font-weight:bold;
margin-top:20px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:8px;
margin:10px;
cursor:pointer;
}

.checkout{
background:green;
color:white;
}

.remove{
background:red;
color:white;
}
</style>

</head>

<body>

<div class="header">
🛒 Bazaar Xpress Cart
</div>

<div id="cartArea"></div>

<script>

let product=JSON.parse(localStorage.getItem("cart"));

if(product){

document.getElementById("cartArea").innerHTML=`

<div class="card">

<img src="${product.image}">

<h2>${product.name}</h2>

<div class="price">
₹${product.price}
</div>

<button class="remove" onclick="removeCart()">
Remove
</button>

</div>

<div class="card">

<div class="total">
Total : ₹${product.price}
</div>

<a href="login.html">

<button class="checkout">

Proceed To Checkout

</button>

</a>

</div>

`;

}else{

document.getElementById("cartArea").innerHTML="<h2 style='text-align:center'>🛒 Your Cart is Empty</h2>";

}

function removeCart(){

localStorage.removeItem("cart");

location.reload();

}

</script>

</body>
</html>
