
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shopping Cart</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#0b3d91;
color:white;
padding:15px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
text-align:center;
}

img{
width:150px;
border-radius:10px;
}

.price{
font-size:26px;
color:green;
font-weight:bold;
}

.total{
font-size:28px;
font-weight:bold;
margin-top:20px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:8px;
margin:10px;
cursor:pointer;
}

.checkout{
background:green;
color:white;
}

.remove{
background:red;
color:white;
}
</style>

</head>

<body>

<div class="header">
🛒 Bazaar Xpress Cart
</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=600">

<h2>iPhone 15</h2>

<div class="price">
₹69,999
</div>

<button class="remove">
Remove
</button>

</div>

<div class="card">

<div class="total">
Total : ₹69,999
</div>

<a href="login.html">
<button class="checkout">
Proceed To Checkout
</button>
</a>

</div>

</body>
</html>
