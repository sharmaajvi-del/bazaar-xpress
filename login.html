<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Bazaar Xpress</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2f2f2;
margin:0;
}

.header{
background:#0b3d91;
color:white;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.box{
background:white;
width:90%;
max-width:350px;
margin:40px auto;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#0b3d91;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

p{
text-align:center;
}
</style>

</head>

<body>

<div class="header">
Bazaar Xpress Login
</div>

<div class="box">

<h2>Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<p>New User? Sign Up</p>

</div>

</body>
</html>
