<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazaar Xpress Admin</title>

<link rel="stylesheet" href="style.css">

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

.header{
background:#0b3d91;
color:white;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:500px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

input,textarea,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:green;
color:white;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0a8a0a;
}
</style>

</head>

<body>

<div class="header">
Bazaar Xpress Admin
</div>

<div class="container">

<h2>Add Product</h2>

<input type="text" id="productName" placeholder="Product Name">

<input type="number" id="productPrice" placeholder="Price">

<select id="productCategory">
<option>Mobile</option>
<option>Electronics</option>
<option>Fashion</option>
<option>Home & Kitchen</option>
</select>

<textarea id="productDescription" placeholder="Product Description"></textarea>

<input type="file" id="productImage" multiple>

<button id="saveProduct">Save Product</button>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
