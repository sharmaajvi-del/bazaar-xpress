<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment - Bazaar Xpress</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f2f2f2;
}

.header{
background:#0b3d91;
color:white;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.box{
background:white;
width:90%;
max-width:420px;
margin:25px auto;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.option{
padding:15px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
font-size:18px;
}

button{
width:100%;
padding:14px;
background:green;
color:white;
font-size:18px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}
</style>

</head>

<body>

<div class="header">
Payment
</div>

<div class="box">

<h2>Select Payment Method</h2>

<div class="option">
<input type="radio" name="pay" checked>
💵 Cash on Delivery
</div>

<div class="option">
<input type="radio" name="pay">
📱 UPI (PhonePe / Google Pay / Paytm)
</div>

<div class="option">
<input type="radio" name="pay">
💳 Credit / Debit Card
</div>

<button onclick="window.location.href='success.html'">
Place Order
</button>

</div>

</body>
</html>
